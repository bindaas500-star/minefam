<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MineFam - Tap to Earn</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1113">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9713902784355107" crossorigin="anonymous"></script>
  <script src="https://quge5.com/88/tag.min.js" data-zone="257366" async data-cfasync="false"></script>
<style>
  .game-wrap { display:flex; flex-direction:column; align-items:center; padding:20px; text-align:center; }
  .tap-timer { font-size:15px; color:var(--text-dim,#9aa0a6); margin-bottom:6px; }
  .tap-score { font-size:44px; font-weight:800; color:var(--gold,#f2b705); margin-bottom:18px; }
  .tap-button {
    width:190px; height:190px; border-radius:50%; border:none;
    background:radial-gradient(circle at 35% 30%, #ffd76a, #f2b705 60%, #b98700 100%);
    box-shadow:0 8px 24px rgba(242,183,5,0.4);
    font-size:60px; color:#3a2900; user-select:none;
    transition:transform 0.05s;
  }
  .tap-button:active { transform:scale(0.92); }
  .tap-button:disabled { opacity:0.4; }
  .plays-left { font-size:13px; color:var(--text-dim,#9aa0a6); margin-top:18px; }
  .result-box {
    margin-top:20px; padding:16px; border-radius:14px;
    background:rgba(242,183,5,0.1); display:none;
  }
  .result-box.show { display:block; }
  .start-btn {
    margin-top:20px; padding:12px 28px; border:none; border-radius:24px;
    background:linear-gradient(135deg,#6a11cb,#2575fc); color:#fff; font-weight:700; font-size:15px;
  }
  .start-btn:disabled { opacity:0.4; }
</style>
</head>
<body>

<div class="app-shell">
  <div class="topbar">
    <div>
      <div class="greet">Tap fast!</div>
      <div class="username">Tap to Earn</div>
    </div>
    <div class="coin-pill">🪙 <span id="coinBalance">0</span></div>
  </div>

  <div class="game-wrap">
    <div class="tap-timer" id="timerText">Get ready...</div>
    <div class="tap-score" id="scoreText">0</div>
    <button class="tap-button" id="tapButton" disabled>TAP</button>

    <button class="start-btn" id="startBtn">Start (15s)</button>
    <div class="plays-left" id="playsLeftText"></div>

    <div class="result-box" id="resultBox">
      <div style="font-size:15px; margin-bottom:6px;">Round over!</div>
      <div style="font-size:14px; color:var(--text-dim,#9aa0a6);">Taps: <span id="finalTaps">0</span></div>
      <div style="font-size:18px; color:var(--gold,#f2b705); font-weight:700; margin-top:6px;">+<span id="coinsWon">0</span> 🪙 earned</div>
    </div>
  </div>

  <div style="text-align:center; margin-top:10px;">
    <a href="games.html" style="color:var(--text-dim,#9aa0a6); font-size:13px; text-decoration:none;">← Back to Games</a>
  </div>
</div>

<script type="module">
import { auth, db, onAuthStateChanged, ref, get, update } from "./firebase-config.js";

const MAX_PLAYS_PER_DAY = 3;
const ROUND_SECONDS = 15;
const COINS_PER_10_TAPS = 1;   // 1 coin per 10 taps
const MAX_COINS_PER_ROUND = 15; // cap so a round can't give unlimited coins

let currentUser = null;
let tapCount = 0;
let roundActive = false;
let timeLeft = ROUND_SECONDS;
let countdownInterval = null;

const tapButton = document.getElementById('tapButton');
const startBtn = document.getElementById('startBtn');
const scoreText = document.getElementById('scoreText');
const timerText = document.getElementById('timerText');
const playsLeftText = document.getElementById('playsLeftText');
const resultBox = document.getElementById('resultBox');
const finalTaps = document.getElementById('finalTaps');
const coinsWon = document.getElementById('coinsWon');

function getTodayKey() {
  return new Date().toISOString().slice(0, 10);
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  currentUser = user;

  const snap = await get(ref(db, `users/${user.uid}`));
  const data = snap.val() || {};
  document.getElementById("coinBalance").textContent = Math.floor(data.coins || 0);

  const playsToday = (data.games && data.games.tapGame && data.games.tapGame[getTodayKey()]) || 0;
  updatePlaysLeftText(playsToday);

  if (playsToday >= MAX_PLAYS_PER_DAY) {
    startBtn.disabled = true;
    startBtn.innerText = 'No plays left today';
  }
});

function updatePlaysLeftText(playsToday) {
  const remaining = Math.max(0, MAX_PLAYS_PER_DAY - playsToday);
  playsLeftText.innerText = remaining + ' / ' + MAX_PLAYS_PER_DAY + ' plays left today';
}

startBtn.addEventListener('click', startRound);
tapButton.addEventListener('click', () => {
  if (!roundActive) return;
  tapCount++;
  scoreText.innerText = tapCount;
});

function startRound() {
  tapCount = 0;
  timeLeft = ROUND_SECONDS;
  scoreText.innerText = '0';
  resultBox.classList.remove('show');
  startBtn.disabled = true;
  tapButton.disabled = false;
  roundActive = true;
  timerText.innerText = timeLeft + 's left';

  countdownInterval = setInterval(() => {
    timeLeft--;
    timerText.innerText = timeLeft + 's left';
    if (timeLeft <= 0) {
      endRound();
    }
  }, 1000);
}

async function endRound() {
  clearInterval(countdownInterval);
  roundActive = false;
  tapButton.disabled = true;
  timerText.innerText = 'Round over';

  const coinsEarned = Math.min(Math.floor(tapCount / 10) * COINS_PER_10_TAPS, MAX_COINS_PER_ROUND);

  finalTaps.innerText = tapCount;
  coinsWon.innerText = coinsEarned;
  resultBox.classList.add('show');

  // Save coins + increment today's play count
  const userRef = ref(db, `users/${currentUser.uid}`);
  const snap = await get(userRef);
  const data = snap.val() || {};
  const todayKey = getTodayKey();
  const playsToday = (data.games && data.games.tapGame && data.games.tapGame[todayKey]) || 0;
  const newPlays = playsToday + 1;
  const newCoins = (data.coins || 0) + coinsEarned;

  const updates = {};
  updates.coins = newCoins;
  updates[`games/tapGame/${todayKey}`] = newPlays;
  await update(userRef, updates);

  document.getElementById('coinBalance').textContent = Math.floor(newCoins);
  updatePlaysLeftText(newPlays);

  if (newPlays >= MAX_PLAYS_PER_DAY) {
    startBtn.disabled = true;
    startBtn.innerText = 'No plays left today';
  } else {
    startBtn.disabled = false;
    startBtn.innerText = 'Play again (15s)';
  }
}
</script>
</body>
</html>
