<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MineFam - Games</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1113">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9713902784355107" crossorigin="anonymous"></script>
  <script src="https://quge5.com/88/tag.min.js" data-zone="257366" async data-cfasync="false"></script>
</head>
<body>

<div class="app-shell">
  <div class="topbar">
    <div>
      <div class="greet">Play & earn</div>
      <div class="username">Games</div>
    </div>
    <div class="coin-pill">🪙 <span id="coinBalance">0</span></div>
  </div>

  <div class="section-title">Choose a game</div>
  <div class="tile-grid">
    <a href="tap-game.html" class="tile">
      <div class="icon-box" style="background:rgba(242,183,5,0.15); color:var(--gold);">👆</div>
      <div class="label">Tap to Earn</div>
      <div class="sub">Tap fast, earn coins</div>
    </a>
    <a href="quiz-game.html" class="tile">
      <div class="icon-box" style="background:rgba(47,211,199,0.15); color:var(--teal);">🧠</div>
      <div class="label">Quiz</div>
      <div class="sub">Answer & earn</div>
    </a>
    <a href="memory-game.html" class="tile">
      <div class="icon-box" style="background:rgba(242,183,5,0.15); color:var(--gold);">🎴</div>
      <div class="label">Memory Match</div>
      <div class="sub">Match pairs</div>
    </a>
    <a href="reaction-game.html" class="tile">
      <div class="icon-box" style="background:rgba(47,211,199,0.15); color:var(--teal);">⚡</div>
      <div class="label">Catch the Coin</div>
      <div class="sub">Test your reflex</div>
    </a>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">⛏️</span>Mine</a>
  <a href="family.html" class="nav-item"><span class="nav-icon">👨‍👩‍👧</span>Family</a>
  <a href="rooms.html" class="nav-item"><span class="nav-icon">💬</span>Rooms</a>
</nav>

<script type="module">
import { auth, db, onAuthStateChanged, ref, get } from "./firebase-config.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  const snap = await get(ref(db, `users/${user.uid}`));
  const data = snap.val() || {};
  document.getElementById("coinBalance").textContent = Math.floor(data.coins || 0);
});
</script>
</body>
</html>
